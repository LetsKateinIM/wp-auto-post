name: Daily WordPress Post

on:
  # schedule:
  #   # 毎日 日本時間 10:00 (UTC 1:00) を一時停止
  #   - cron: '0 1 * * *'
  workflow_dispatch: # これを残しておけば、ボタンを押した時だけ実行できます

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        # ↓ ここに deep-translator を追加しました
        run: pip install requests deep-translator
      - name: Run post script
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
        run: python post_script.py
