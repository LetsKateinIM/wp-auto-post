name: Daily WordPress Post

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      # v3 から v4 へ変更（Node.js 20/24対応）
      - uses: actions/checkout@v4

      # v4 から v5 へ変更（Node.js 20/24対応）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests deep-translator

      - name: Run post script
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
        run: python post_script.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add articles.json
          git commit -m "Automated: Remove posted article from queue" || exit 0
          git push
